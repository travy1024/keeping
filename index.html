<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<meta name="theme-color" content="#F7F4EF">
<title>记账本</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --card-hover: #FAFAF8;
    --text: #2D2B28;
    --text-secondary: #8B8680;
    --text-muted: #BFBBB4;
    --border: #EBE7E0;
    --border-light: #F2EFEA;
    --income: #2EBB7B;
    --income-bg: #EBF9F2;
    --expense: #F56165;
    --expense-bg: #FEF0F0;
    --accent: #4A392C;
    --accent-light: #8B7355;
    --gold: #D4A853;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 2px 8px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
    --shadow-lg: 0 8px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
    --radius: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --tab-height: 64px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(212,168,83,.06) 0%, transparent 60%);
  }

  /* ─── Header ─── */
  .app-header {
    padding: 20px 24px 14px;
    padding-top: calc(20px + var(--safe-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .app-header .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.3px;
  }
  .app-header .today {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ─── Tab Content ─── */
  .tab-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 0 20px;
    padding-bottom: calc(var(--tab-height) + 20px + var(--safe-bottom));
    display: none;
  }
  .tab-content.active { display: block; }
  .tab-content::-webkit-scrollbar { display: none; }

  /* ─── Floating Tab Bar ─── */
  .tab-bar-wrap {
    position: fixed;
    bottom: calc(8px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    width: calc(100% - 48px);
    max-width: 380px;
  }
  .tab-bar {
    display: flex;
    background: var(--card);
    border-radius: 50px;
    padding: 6px;
    box-shadow: 0 4px 24px rgba(0,0,0,.1), 0 0 0 1px rgba(0,0,0,.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .tab-btn {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    position: relative;
    z-index: 1;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50px;
  }
  .tab-btn.active {
    color: var(--text);
    font-weight: 600;
  }
  .tab-btn.active::before {
    content: '';
    position: absolute;
    inset: 2px;
    background: var(--bg);
    border-radius: 50px;
    z-index: -1;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .tab-btn svg { width: 22px; height: 22px; }

  /* ─── Type Segment ─── */
  .type-segment {
    display: flex;
    background: var(--card);
    border-radius: 50px;
    padding: 4px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .type-segment button {
    flex: 1;
    padding: 11px 0;
    border: none;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    background: transparent;
    color: var(--text-secondary);
    position: relative;
    z-index: 1;
    letter-spacing: .3px;
  }
  .type-segment button.active {
    color: #fff;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .type-segment button.type-expense.active { background: var(--expense); }
  .type-segment button.type-income.active { background: var(--income); }

  /* ─── Hero Amount ─── */
  .amount-hero {
    text-align: center;
    margin-bottom: 24px;
  }
  .amount-hero .amount-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    letter-spacing: .5px;
  }
  .amount-hero .amount-display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
  }
  .amount-hero .currency {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .amount-hero input {
    width: 180px;
    border: none;
    outline: none;
    font-size: 48px;
    font-weight: 700;
    background: transparent;
    color: var(--text);
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
    letter-spacing: -1px;
    caret-color: var(--accent-light);
    line-height: 1.1;
  }
  .amount-hero input::placeholder { color: var(--text-muted); }

  /* ─── Category Pills ─── */
  .section-label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .category-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .cat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }
  .cat-pill:active { transform: scale(.95); }
  .cat-pill.selected {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 12px rgba(74,57,44,.25);
  }
  .cat-pill .cp-icon { font-size: 16px; line-height: 1; }
  .cat-pill.cat-manage {
    border-style: dashed;
    border-color: var(--text-muted);
    color: var(--text-muted);
    background: transparent;
    box-shadow: none;
  }
  .cat-pill.cat-manage:active { border-color: var(--accent); color: var(--accent); }

  /* ─── Form Row ─── */
  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .form-row > * { flex: 1; }
  .input-field {
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 15px;
    font-family: inherit;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: all .2s;
    -webkit-appearance: none;
    box-shadow: var(--shadow-sm);
  }
  .input-field:focus {
    border-color: var(--accent-light);
    box-shadow: 0 0 0 3px rgba(139,115,85,.08);
  }
  .input-field.date-field {
    text-align: center;
    color-scheme: light;
  }
  input[type="month"].input-field { text-align: center; }

  /* ─── Buttons ─── */
  .btn {
    padding: 14px 24px;
    border: none;
    border-radius: var(--radius-md);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    letter-spacing: .3px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    box-shadow: 0 4px 16px rgba(74,57,44,.2);
  }
  .btn-primary:active { background: #3D2F23; }
  .btn-sm {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 50px;
  }
  .btn-pill {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text-secondary);
    box-shadow: var(--shadow-sm);
  }
  .btn-pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: #F9F6F0;
  }
  .btn-pill:active { background: var(--bg); }
  .btn-export {
    background: linear-gradient(135deg, #2EBB7B, #1EA368);
    color: #fff;
    font-size: 13px;
    border-radius: 50px;
    padding: 10px 18px;
    box-shadow: 0 4px 12px rgba(46,187,123,.25);
    white-space: nowrap;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    transition: all .2s;
  }
  .btn-export:active { transform: scale(.96); opacity: .9; }

  /* ─── Filter Row ─── */
  .filter-section {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-section .spacer { flex: 1; }

  /* ─── Transaction Cards ─── */
  .txn-list { display: flex; flex-direction: column; gap: 8px; }
  .txn-card {
    background: var(--card);
    padding: 16px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-sm);
    transition: all .2s;
    border: 1px solid var(--border-light);
  }
  .txn-card:active { transform: scale(.98); background: var(--card-hover); }
  .txn-card .txn-icon-wrap {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .txn-card.income-card .txn-icon-wrap { background: var(--income-bg); }
  .txn-card.expense-card .txn-icon-wrap { background: var(--expense-bg); }
  .txn-card .txn-info { flex: 1; min-width: 0; }
  .txn-card .txn-title { font-size: 15px; font-weight: 600; }
  .txn-card .txn-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 3px;
    display: flex;
    gap: 8px;
  }
  .txn-card .txn-amount {
    font-size: 18px;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: -.3px;
  }
  .txn-card.income-card .txn-amount { color: var(--income); }
  .txn-card.expense-card .txn-amount { color: var(--expense); }
  .txn-del {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }
  .txn-del:active { background: var(--expense-bg); color: var(--expense); }

  /* ─── Empty State ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon {
    font-size: 56px;
    margin-bottom: 16px;
    opacity: .7;
  }
  .empty-state p { font-size: 14px; font-weight: 500; }

  /* ─── Stats Cards ─── */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--card);
    padding: 16px 12px;
    border-radius: var(--radius-md);
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-light);
  }
  .summary-card .val {
    font-size: 18px;
    font-weight: 700;
    margin-top: 6px;
    letter-spacing: -.3px;
  }
  .summary-card .lbl { font-size: 11px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  .summary-card.card-income .val { color: var(--income); }
  .summary-card.card-expense .val { color: var(--expense); }
  .summary-card.card-balance {
    background: var(--accent);
    border-color: var(--accent);
  }
  .summary-card.card-balance .lbl { color: rgba(255,255,255,.7); }
  .summary-card.card-balance .val { color: #fff; }

  /* ─── Chart Wrap ─── */
  .chart-wrap {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    border: 1px solid var(--border-light);
  }
  .chart-wrap canvas { max-height: 220px; }
  .chart-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: -.2px;
  }
  .chart-title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ─── Ranking ─── */
  .rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-pos {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .rank-pos.top { background: var(--accent); color: #fff; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 14px; font-weight: 500; }
  .rank-bar-bg {
    height: 4px;
    background: var(--bg);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .rank-bar { height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .rank-amount { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .rank-pct { font-size: 12px; color: var(--text-muted); margin-left: 4px; }

  /* ─── Month Picker ─── */
  .month-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .month-arrow {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    box-shadow: var(--shadow-sm);
    transition: all .2s;
  }
  .month-arrow:active { background: var(--bg); }
  .month-label {
    flex: 1;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -.2px;
  }

  /* ─── Modal ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn .25s ease;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 72vh;
    overflow-y: auto;
    padding: 28px 24px 34px;
    animation: slideUp .35s cubic-bezier(.32,.72,0,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; letter-spacing: -.2px; }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .color-options { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all .2s;
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
  }
  .color-dot.selected { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .cat-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg);
    border-radius: var(--radius-md);
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 500;
  }
  .cat-list-item .del-cat {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 50px;
    color: var(--text-muted);
    transition: all .2s;
  }
  .cat-list-item .del-cat:active { background: var(--expense-bg); color: var(--expense); }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    top: calc(60px + var(--safe-top));
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    z-index: 300;
    opacity: 0;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(74,57,44,.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Desktop ─── */
  @media (min-width: 500px) {
    body {
      max-width: 420px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(0,0,0,.08);
    }
  }
</style>
</head>
<body>

<div class="app-header">
  <span class="logo">记账本</span>
  <span class="today" id="todayLabel"></span>
</div>

<div class="toast" id="toast"></div>

<!-- ═══════════ TAB 1: 记账 ═══════════ -->
<div class="tab-content active" id="tab-record">
  <div class="type-segment" id="typeToggle">
    <button class="type-expense active" data-type="expense" onclick="setType('expense')">支出</button>
    <button class="type-income" data-type="income" onclick="setType('income')">收入</button>
  </div>

  <div class="amount-hero">
    <div class="amount-label" id="amountHint">支出了多少钱？</div>
    <div class="amount-display">
      <span class="currency">¥</span>
      <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal" autofocus>
    </div>
  </div>

  <div class="section-label">选择分类</div>
  <div class="category-pills" id="categoryGrid"></div>

  <div class="form-row">
    <input type="date" id="dateInput" class="input-field date-field">
    <input type="text" id="noteInput" class="input-field" placeholder="备注（选填）" maxlength="50">
  </div>

  <button class="btn btn-primary" onclick="addTransaction()">记一笔</button>
</div>

<!-- ═══════════ TAB 2: 明细 ═══════════ -->
<div class="tab-content" id="tab-detail">
  <div class="filter-section">
    <input type="month" id="monthFilter" class="input-field" style="flex:0;width:auto;" onchange="renderDetail()">
    <button class="btn-sm btn-pill active filter-type" data-type="all" onclick="setFilterType('all', this)">全部</button>
    <button class="btn-sm btn-pill filter-type" data-type="expense" onclick="setFilterType('expense', this)">支出</button>
    <button class="btn-sm btn-pill filter-type" data-type="income" onclick="setFilterType('income', this)">收入</button>
    <span class="spacer"></span>
    <button class="btn-export" onclick="exportExcel()">导出 Excel</button>
  </div>

  <div class="txn-list" id="txnList"></div>
  <div class="empty-state" id="emptyDetail">
    <div class="empty-icon">📝</div>
    <p>还没有记录</p>
  </div>
</div>

<!-- ═══════════ TAB 3: 统计 ═══════════ -->
<div class="tab-content" id="tab-stats">
  <div class="month-picker">
    <button class="month-arrow" onclick="shiftMonth(-1)">◀</button>
    <span class="month-label" id="statsMonthLabel">2026年5月</span>
    <button class="month-arrow" onclick="shiftMonth(1)">▶</button>
    <input type="hidden" id="statsMonth">
  </div>

  <div class="summary-row">
    <div class="summary-card card-income"><div class="lbl">收入</div><div class="val" id="sumIncome">¥0</div></div>
    <div class="summary-card card-expense"><div class="lbl">支出</div><div class="val" id="sumExpense">¥0</div></div>
    <div class="summary-card card-balance"><div class="lbl">结余</div><div class="val" id="sumBalance">¥0</div></div>
  </div>

  <div class="chart-wrap">
    <div class="chart-title"><span class="dot" style="background:var(--expense)"></span>支出分类占比</div>
    <canvas id="pieChart"></canvas>
  </div>

  <div class="chart-wrap">
    <div class="chart-title"><span class="dot" style="background:var(--accent-light)"></span>近6月趋势</div>
    <canvas id="trendChart"></canvas>
  </div>

  <div class="chart-wrap" id="rankCard" style="display:none;">
    <div class="chart-title">支出排行</div>
    <div id="rankList"></div>
  </div>
</div>

<!-- ═══════════ Floating Tab Bar ═══════════ -->
<div class="tab-bar-wrap">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('record', event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      记账
    </button>
    <button class="tab-btn" onclick="switchTab('detail', event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      明细
    </button>
    <button class="tab-btn" onclick="switchTab('stats', event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      统计
    </button>
  </div>
</div>

<!-- ═══════════ Category Modal ═══════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ==================== DATA LAYER ====================
const DEFAULT_CATS = [
  { id: 'c1',  name: '餐饮',   type: 'expense', icon: '🍜', color: '#F56165' },
  { id: 'c2',  name: '交通',   type: 'expense', icon: '🚕', color: '#F59E0B' },
  { id: 'c3',  name: '购物',   type: 'expense', icon: '🛒', color: '#8B5CF6' },
  { id: 'c4',  name: '娱乐',   type: 'expense', icon: '🎬', color: '#EC4899' },
  { id: 'c5',  name: '居家',   type: 'expense', icon: '🏠', color: '#78716C' },
  { id: 'c6',  name: '日用',   type: 'expense', icon: '🧻', color: '#14B8A6' },
  { id: 'c7',  name: '数码',   type: 'expense', icon: '📱', color: '#3B82F6' },
  { id: 'c8',  name: '医疗',   type: 'expense', icon: '💊', color: '#F97316' },
  { id: 'c9',  name: '学习',   type: 'expense', icon: '📖', color: '#6366F1' },
  { id: 'c10', name: '其他',   type: 'expense', icon: '💸', color: '#9CA3AF' },
  { id: 'c11', name: '工资',   type: 'income', icon: '💼', color: '#2EBB7B' },
  { id: 'c12', name: '兼职',   type: 'income', icon: '💻', color: '#34D399' },
  { id: 'c13', name: '理财',   type: 'income', icon: '📈', color: '#059669' },
  { id: 'c14', name: '红包',   type: 'income', icon: '🧧', color: '#DC2626' },
  { id: 'c15', name: '其他',   type: 'income', icon: '💰', color: '#6EE7B7' },
];

function loadData() {
  const raw = localStorage.getItem('bk_data');
  if (raw) return JSON.parse(raw);
  return { transactions: [], categories: [...DEFAULT_CATS] };
}
function saveData(data) { localStorage.setItem('bk_data', JSON.stringify(data)); }

let appData = loadData();
let currentType = 'expense';
let selectedCatId = null;
let filterType = 'all';

function getCats(type) { return appData.categories.filter(c => c.type === type); }

// ==================== HELPERS ====================
function $(id) { return document.getElementById(id); }
function fmt(n) { return (n || 0).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 1800);
}

// ==================== HEADER DATE ====================
function updateToday() {
  const now = new Date();
  $('todayLabel').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
}
updateToday();

// ==================== TAB SWITCHING ====================
function switchTab(tab, e) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  $('tab-' + tab).classList.add('active');
  const btn = (e && e.target) ? e.target.closest('.tab-btn') : document.querySelector(`.tab-btn[onclick*="${tab}"]`);
  if (btn) btn.classList.add('active');
  if (tab === 'record') { renderCategories(); $('amountInput').focus(); }
  if (tab === 'detail') { initMonthFilter(); renderDetail(); }
  if (tab === 'stats') { initStatsMonth(); renderStats(); }
}

// ==================== AMOUNT INPUT ====================
$('amountInput').addEventListener('input', function() {
  let val = this.value.replace(/[^\d.]/g, '');
  const parts = val.split('.');
  if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
  if (parts.length === 2 && parts[1].length > 2) val = parts[0] + '.' + parts[1].slice(0, 2);
  this.value = val;
});

// ==================== TYPE & CATEGORIES ====================
function setType(type) {
  currentType = type;
  selectedCatId = null;
  document.querySelectorAll('#typeToggle button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#typeToggle .type-${type}`).classList.add('active');
  $('amountHint').textContent = type === 'expense' ? '支出了多少钱？' : '收入了多少钱？';
  renderCategories();
}

function renderCategories() {
  const grid = $('categoryGrid');
  const cats = getCats(currentType);
  grid.innerHTML = cats.map(c => `
    <div class="cat-pill${c.id === selectedCatId ? ' selected' : ''}" onclick="selectCat('${c.id}')">
      <span class="cp-icon">${c.icon}</span>${c.name}
    </div>
  `).join('') + `
    <div class="cat-pill cat-manage" onclick="openCatManage()">+ 管理</div>`;
}

function selectCat(id) { selectedCatId = id; renderCategories(); }

// ==================== ADD TRANSACTION ====================
function addTransaction() {
  const amount = parseFloat($('amountInput').value);
  if (!amount || amount <= 0) { shakeEl($('amountInput')); return; }
  if (!selectedCatId) {
    const firstCat = getCats(currentType)[0];
    if (firstCat) selectedCatId = firstCat.id;
    else { alert('请先添加分类'); return; }
  }
  const txn = {
    id: genId(),
    type: currentType,
    amount: amount,
    categoryId: selectedCatId,
    date: $('dateInput').value || new Date().toISOString().slice(0, 10),
    note: $('noteInput').value.trim(),
    createdAt: Date.now()
  };
  appData.transactions.unshift(txn);
  saveData(appData);
  $('amountInput').value = '';
  $('noteInput').value = '';
  selectedCatId = null;
  renderCategories();
  showToast('已记录');
}

function shakeEl(el) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake .4s ease';
}
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`;
document.head.appendChild(shakeStyle);

// ==================== DETAIL PAGE ====================
function initMonthFilter() {
  const now = new Date();
  $('monthFilter').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

function setFilterType(type, btn) {
  filterType = type;
  document.querySelectorAll('.filter-type').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDetail();
}

function getFilteredTxns() {
  const month = $('monthFilter').value;
  let txns = [...appData.transactions];
  if (month) txns = txns.filter(t => t.date.startsWith(month));
  if (filterType !== 'all') txns = txns.filter(t => t.type === filterType);
  txns.sort((a, b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
  return txns;
}

function renderDetail() {
  const txns = getFilteredTxns();
  const list = $('txnList');
  const empty = $('emptyDetail');
  if (txns.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = txns.map(t => {
    const cat = appData.categories.find(c => c.id === t.categoryId) || {};
    const cardClass = t.type === 'income' ? 'income-card' : 'expense-card';
    const sign = t.type === 'income' ? '+' : '-';
    return `
    <div class="txn-card ${cardClass}">
      <div class="txn-icon-wrap">${cat.icon || '📌'}</div>
      <div class="txn-info">
        <div class="txn-title">${cat.name || '未分类'}</div>
        <div class="txn-sub">
          <span>${t.date}</span>
          ${t.note ? `<span>· ${escHtml(t.note)}</span>` : ''}
        </div>
      </div>
      <div class="txn-amount">${sign}¥${fmt(t.amount)}</div>
      <button class="txn-del" onclick="delTxn('${t.id}')">×</button>
    </div>`;
  }).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function delTxn(id) {
  if (!confirm('确定删除这条记录吗？')) return;
  appData.transactions = appData.transactions.filter(t => t.id !== id);
  saveData(appData);
  renderDetail();
}

// ==================== EXCEL EXPORT ====================
function exportExcel() {
  const txns = getFilteredTxns();
  if (txns.length === 0) { alert('本月暂无记录，无法导出'); return; }
  const month = $('monthFilter').value || new Date().toISOString().slice(0,7);
  const rows = [['日期', '类型', '分类', '金额', '备注']];
  let totalIncome = 0, totalExpense = 0;
  txns.forEach(t => {
    const cat = appData.categories.find(c => c.id === t.categoryId);
    rows.push([t.date, t.type==='income'?'收入':'支出', cat?cat.name:'未分类', t.amount, t.note||'']);
    if (t.type === 'income') totalIncome += t.amount;
    else totalExpense += t.amount;
  });
  rows.push([]);
  rows.push(['', '', '收入合计', totalIncome, '']);
  rows.push(['', '', '支出合计', totalExpense, '']);
  rows.push(['', '', '净收支', totalIncome - totalExpense, '']);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:8},{wch:12},{wch:12},{wch:20}];
  const lastRow = rows.length;
  for (let r = lastRow - 2; r < lastRow; r++)
    for (let c = 0; c < 5; c++) {
      const cell = XLSX.utils.encode_cell({r, c});
      if (ws[cell]) ws[cell].s = { font: { bold: true } };
    }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '账单');
  XLSX.writeFile(wb, `${month.replace('-','年')}月账单.xlsx`);
}

// ==================== STATS PAGE ====================
let statsYear, statsMonthNum;
function initStatsMonth() {
  const now = new Date();
  statsYear = now.getFullYear();
  statsMonthNum = now.getMonth() + 1;
  syncStatsMonth();
}
function syncStatsMonth() {
  $('statsMonth').value = `${statsYear}-${String(statsMonthNum).padStart(2,'0')}`;
  $('statsMonthLabel').textContent = `${statsYear}年${statsMonthNum}月`;
}
function shiftMonth(delta) {
  statsMonthNum += delta;
  if (statsMonthNum > 12) { statsMonthNum = 1; statsYear++; }
  if (statsMonthNum < 1) { statsMonthNum = 12; statsYear--; }
  syncStatsMonth();
  renderStats();
}

let pieChartInst = null, trendChartInst = null;

function renderStats() {
  const month = $('statsMonth').value;
  const txns = appData.transactions.filter(t => t.date.startsWith(month));
  const income = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  $('sumIncome').textContent = `¥${fmt(income)}`;
  $('sumExpense').textContent = `¥${fmt(expense)}`;
  $('sumBalance').textContent = `¥${fmt(income - expense)}`;

  // Pie chart
  const expenseTxns = txns.filter(t => t.type === 'expense');
  const catMap = {};
  expenseTxns.forEach(t => {
    const cat = appData.categories.find(c => c.id === t.categoryId);
    const name = cat ? cat.name : '未分类';
    const color = cat ? cat.color : '#9CA3AF';
    if (!catMap[name]) catMap[name] = { amount: 0, color };
    catMap[name].amount += t.amount;
  });
  const pieLabels = Object.keys(catMap);
  const pieData = pieLabels.map(k => catMap[k].amount);
  const pieColors = pieLabels.map(k => catMap[k].color);

  const pieCtx = $('pieChart').getContext('2d');
  if (pieChartInst) pieChartInst.destroy();
  if (pieLabels.length > 0) {
    pieChartInst = new Chart(pieCtx, {
      type: 'doughnut',
      data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 3, borderColor: '#fff', hoverBorderWidth: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: '62%',
        plugins: {
          legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, pointStyleWidth: 10, font: { size: 12, family: "-apple-system, PingFang SC, sans-serif" }, color: '#8B8680' } }
        }
      }
    });
  } else {
    pieChartInst = new Chart(pieCtx, {
      type: 'doughnut',
      data: { labels: ['暂无支出'], datasets: [{ data: [1], backgroundColor: ['#EBE7E0'], borderWidth: 0 }] },
      options: { responsive: true, cutout: '62%', plugins: { legend: { display: false } } }
    });
  }

  // Ranking
  const sorted = Object.entries(catMap).sort((a, b) => b[1].amount - a[1].amount);
  const maxAmt = sorted.length > 0 ? sorted[0][1].amount : 1;
  if (sorted.length > 0) {
    $('rankCard').style.display = '';
    $('rankList').innerHTML = sorted.map(([name, data], i) => `
      <div class="rank-item">
        <div class="rank-pos ${i<3?'top':''}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${name}</div>
          <div class="rank-bar-bg"><div class="rank-bar" style="width:${(data.amount/maxAmt*100).toFixed(0)}%;background:${data.color}"></div></div>
        </div>
        <span class="rank-amount">¥${fmt(data.amount)}</span>
        <span class="rank-pct">${expense>0?(data.amount/expense*100).toFixed(1):0}%</span>
      </div>
    `).join('');
  } else {
    $('rankCard').style.display = 'none';
  }

  // Trend chart
  const trendCtx = $('trendChart').getContext('2d');
  if (trendChartInst) trendChartInst.destroy();
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  const trendIncome = months.map(m => appData.transactions.filter(t => t.type==='income' && t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
  const trendExpense = months.map(m => appData.transactions.filter(t => t.type==='expense' && t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
  const trendLabels = months.map(m => m.slice(2).replace('-','月'));
  trendChartInst = new Chart(trendCtx, {
    type: 'bar',
    data: {
      labels: trendLabels,
      datasets: [
        { label: '收入', data: trendIncome, backgroundColor: 'rgba(46,187,123,.7)', borderRadius: 8, borderSkipped: false },
        { label: '支出', data: trendExpense, backgroundColor: 'rgba(245,97,101,.5)', borderRadius: 8, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 24, font: { size: 12 }, color: '#8B8680' } } },
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => '¥'+v, font: { size: 11 }, color: '#BFBBB4' }, grid: { color: '#F2EFEA' } },
        x: { ticks: { font: { size: 11 }, color: '#BFBBB4' }, grid: { display: false } }
      }
    }
  });
}

// ==================== CATEGORY MANAGEMENT ====================
function openCatManage() {
  const modal = $('modalContent');
  modal.innerHTML = `
    <div class="modal-handle"></div>
    <h3>管理分类</h3>
    <div style="margin-bottom:16px;">
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="btn-sm btn-pill active cat-mgr-tab" data-cmtype="expense" onclick="switchCatMgrTab('expense')">支出分类</button>
        <button class="btn-sm btn-pill cat-mgr-tab" data-cmtype="income" onclick="switchCatMgrTab('income')">收入分类</button>
      </div>
      <div id="catMgrList"></div>
    </div>
    <div style="border-top:1px solid var(--border-light);padding-top:18px;">
      <div class="section-label" style="margin-bottom:10px;">添加新分类</div>
      <div class="form-row">
        <input type="text" id="newCatName" class="input-field" placeholder="分类名称" maxlength="6">
        <input type="text" id="newCatIcon" class="input-field" placeholder="图标" maxlength="4" style="flex:0 0 68px;">
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--text-secondary);">颜色</span>
        <div class="color-options" id="colorOptions">
          ${['#F56165','#F59E0B','#2EBB7B','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F97316','#78716C','#4A392C'].map(c =>
            `<div class="color-dot" style="background:${c}" data-color="${c}" onclick="selectColor('${c}',this)"></div>`
          ).join('')}
        </div>
      </div>
      <input type="hidden" id="newCatColor" value="#F56165">
      <button class="btn btn-primary" onclick="addCategory()">添加分类</button>
    </div>
    <button class="btn btn-pill" onclick="closeModal()" style="width:100%;margin-top:10px;">关闭</button>
  `;
  // init first color as selected
  setTimeout(() => { const first = document.querySelector('#colorOptions .color-dot'); if (first) { first.classList.add('selected'); $('newCatColor').value = first.dataset.color; } }, 50);
  $('modalOverlay').classList.add('show');
  switchCatMgrTab(currentType);
}

function switchCatMgrTab(type) {
  document.querySelectorAll('.cat-mgr-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.cat-mgr-tab[data-cmtype="${type}"]`).classList.add('active');
  const cats = getCats(type);
  $('catMgrList').innerHTML = cats.map(c => `
    <div class="cat-list-item">
      <span>${c.icon} ${c.name}</span>
      <button class="del-cat" onclick="deleteCategory('${c.id}')">删除</button>
    </div>
  `).join('') || '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:12px;">暂无分类</p>';
}

function selectColor(color, el) {
  document.querySelectorAll('#colorOptions .color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  $('newCatColor').value = color;
}

function addCategory() {
  const name = $('newCatName').value.trim();
  const icon = $('newCatIcon').value.trim() || '📌';
  const color = $('newCatColor').value;
  if (!name) { alert('请输入分类名称'); return; }
  const activeTab = document.querySelector('.cat-mgr-tab.active');
  const type = activeTab ? activeTab.dataset.cmtype : currentType;
  appData.categories.push({ id: genId(), name, type, icon, color });
  saveData(appData);
  openCatManage();
  renderCategories();
}

function deleteCategory(id) {
  const cat = appData.categories.find(c => c.id === id);
  if (!cat) return;
  const used = appData.transactions.some(t => t.categoryId === id);
  if (used && !confirm(`分类"${cat.name}"有交易记录，删除后这些记录将显示为"未分类"，确定删除？`)) return;
  if (!used && !confirm(`确定删除分类"${cat.name}"？`)) return;
  appData.categories = appData.categories.filter(c => c.id !== id);
  saveData(appData);
  openCatManage();
  renderCategories();
}

function closeModal() { $('modalOverlay').classList.remove('show'); }

// ==================== INIT ====================
$('dateInput').value = new Date().toISOString().slice(0, 10);
renderCategories();
initMonthFilter();
initStatsMonth();
renderStats();

// Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).then(r=>{const c=r.clone();caches.open('bk-v2').then(cache=>cache.put(e.request,c));return r}).catch(()=>caches.match(e.request)))})`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
</script>
</body>
</html>
