<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="记账">
<meta name="theme-color" content="#FEF5ED">
<title>记账</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #FEF5ED; --card: #FFFDF8;
    --label: #3D3028; --sec: #8B7E74; --muted: #C4B8AD;
    --sep: #E8DFD5; --tint: #FF6B6B; --fill: #F2E8DA;
    --green: #4CAF50; --red: #FF5252;
    --shadow-sm: 0 5px 0 rgba(180,160,140,.25), 0 8px 20px rgba(180,160,140,.18);
    --shadow-md: 0 7px 0 rgba(180,160,140,.3), 0 14px 32px rgba(180,160,140,.2);
    --shadow-press: 0 2px 0 rgba(180,160,140,.25), 0 4px 8px rgba(180,160,140,.15);
    --safe-b: env(safe-area-inset-bottom,0px); --safe-t: env(safe-area-inset-top,0px);
    --r-sm: 18px; --r-md: 24px; --r-lg: 32px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Rounded','PingFang SC',sans-serif;
    background:var(--bg);color:var(--label);
    -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none;
    height:100dvh;overflow:hidden;display:flex;flex-direction:column;
  }

  /* nav — solid clay header */
  .nav{
    flex-shrink:0;background:var(--bg);
    padding:0 16px;padding-top:calc(14px + var(--safe-t));padding-bottom:10px;
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .nav .t{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--label)}
  .nav .d{font-size:13px;color:var(--sec);font-weight:500;margin-left:8px}
  .nav .cancel-btn{font-size:15px;color:var(--tint);background:none;border:none;font-family:inherit;font-weight:600;cursor:pointer;display:none;padding:4px 8px}

  /* content */
  .tab{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px;padding-bottom:calc(120px + var(--safe-b));display:none}
  .tab.on{display:block}
  .tab::-webkit-scrollbar{display:none}

  /* segment toggle */
  .seg{display:flex;background:var(--fill);border-radius:var(--r-sm);padding:3px;margin:10px 0 14px}
  .seg button{flex:1;padding:10px 0;border:none;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(.32,.72,0,1);background:transparent;color:var(--sec);font-family:inherit}
  .seg button.on{background:var(--card);color:var(--label);box-shadow:var(--shadow-sm)}
  .seg button.exp.on{color:var(--red)}.seg button.inc.on{color:var(--green)}

  /* amount hero */
  .amt{padding:12px 0 18px;display:flex;align-items:baseline;justify-content:center;gap:6px}
  .amt .sym{font-size:34px;font-weight:500;color:var(--muted)}
  .amt input{width:200px;border:none;outline:none;font-size:52px;font-weight:500;background:transparent;color:var(--label);text-align:center;font-family:inherit;letter-spacing:-2px;caret-color:var(--tint);line-height:1.1}
  .amt input::placeholder{color:var(--muted)}

  /* category grid */
  .lbl{font-size:13px;color:var(--sec);font-weight:600;margin:0 0 10px 4px;letter-spacing:.2px}
  .cat-section{position:relative}
  .done-btn{
    display:none;position:absolute;top:-36px;right:0;
    background:var(--tint);color:#fff;border:none;padding:6px 16px;
    border-radius:50px;font-size:14px;font-weight:600;font-family:inherit;
    cursor:pointer;box-shadow:var(--shadow-sm);transition:all .15s;z-index:10;
  }
  .done-btn:active{transform:scale(.94);box-shadow:var(--shadow-press)}
  .done-btn.show{display:block}

  .cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .cc{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:14px 4px 12px;border-radius:var(--r-md);
    background:var(--card);cursor:pointer;transition:all .2s cubic-bezier(.32,.72,0,1);
    font-size:12px;color:var(--sec);font-weight:500;
    box-shadow:var(--shadow-sm);position:relative;
  }
  .cc:active{transform:scale(.92);box-shadow:var(--shadow-press)}
  .cc.sel{
    background:var(--label);color:#fff;box-shadow:0 7px 0 rgba(60,48,38,.25),0 10px 24px rgba(60,48,38,.2);
  }
  .cc.sel .ci{background:rgba(255,255,255,.2)}
  .cc .ci{
    font-size:26px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    background:var(--fill);border-radius:50%;
    box-shadow:inset 0 2px 4px rgba(255,255,255,.7),inset 0 -3px 4px rgba(0,0,0,.04);
  }
  .cc.sel .ci{box-shadow:inset 0 2px 4px rgba(255,255,255,.2),inset 0 -3px 4px rgba(0,0,0,.1)}
  .cc.mg{background:transparent;border:2px dashed var(--muted);box-shadow:none;color:var(--sec)}
  .cc.mg:active{background:var(--fill);border-color:transparent;box-shadow:var(--shadow-sm)}

  /* jiggle mode */
  .cc.jiggle{animation:jig .5s ease-in-out infinite}
  .cc.jiggle:nth-child(2n){animation-delay:.08s}
  .cc.jiggle:nth-child(3n){animation-delay:.16s}
  .cc.jiggle:nth-child(5n){animation-delay:.24s}
  @keyframes jig{
    0%,100%{transform:rotate(0)}
    10%{transform:rotate(-1.2deg)}
    30%{transform:rotate(1.8deg)}
    50%{transform:rotate(-1.5deg)}
    70%{transform:rotate(.8deg)}
    90%{transform:rotate(-.5deg)}
  }
  .cc .del-badge{
    display:none;position:absolute;top:-8px;right:-8px;
    width:22px;height:22px;border-radius:50%;
    background:var(--red);color:#fff;font-size:11px;line-height:22px;text-align:center;
    cursor:pointer;z-index:5;box-shadow:0 3px 6px rgba(255,82,82,.4);
    font-weight:700;
  }
  .cc.jiggle .del-badge{display:block}
  .cc.dragging{opacity:.8;transform:scale(1.08);z-index:20;box-shadow:0 12px 0 rgba(180,160,140,.3),0 20px 40px rgba(180,160,140,.25)}
  .cc.drag-over{transform:scale(.92);opacity:.5}

  /* form */
  .row{display:flex;gap:8px;margin-bottom:10px}
  .row>*{flex:1}
  .inp{padding:13px 16px;border:none;border-radius:var(--r-sm);font-size:15px;font-family:inherit;background:var(--card);color:var(--label);outline:none;-webkit-appearance:none;letter-spacing:-.1px;box-shadow:inset 0 3px 6px rgba(0,0,0,.04),var(--shadow-sm)}
  .inp:focus{box-shadow:inset 0 3px 6px rgba(0,0,0,.04),0 0 0 3px rgba(255,107,107,.2),var(--shadow-sm)}

  /* buttons */
  .btn{padding:14px;border:none;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.2px;transition:all .2s cubic-bezier(.32,.72,0,1)}
  .btn:active{transform:scale(.94)}
  .btn.prim{background:var(--tint);color:#fff;width:100%;box-shadow:0 6px 0 rgba(200,80,70,.3),0 10px 20px rgba(200,80,70,.15)}
  .btn.prim:active{box-shadow:0 2px 0 rgba(200,80,70,.3),0 4px 8px rgba(200,80,70,.12)}
  .btn.prim.upd{background:var(--green);box-shadow:0 6px 0 rgba(56,142,60,.3),0 10px 20px rgba(56,142,60,.15)}
  .btn.prim.upd:active{box-shadow:0 2px 0 rgba(56,142,60,.3),0 4px 8px rgba(56,142,60,.12)}

  .chip{padding:7px 14px;font-size:12px;font-weight:600;border-radius:50px;border:none;background:var(--fill);color:var(--sec);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;box-shadow:0 2px 0 rgba(180,160,140,.15)}
  .chip:active{transform:scale(.93);box-shadow:none}
  .chip.on{background:var(--label);color:#fff;box-shadow:0 4px 0 rgba(60,48,38,.2),0 6px 14px rgba(60,48,38,.12)}
  .btn.exp{padding:8px 16px;border-radius:50px;border:none;background:var(--tint);color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;box-shadow:0 4px 0 rgba(200,80,70,.25),0 6px 14px rgba(200,80,70,.12)}
  .btn.exp:active{transform:scale(.93);box-shadow:0 1px 0 rgba(200,80,70,.25)}

  /* filter */
  .fbar{margin:14px 0}
  .frow{display:flex;gap:6px;align-items:center;margin-bottom:8px}
  .frow:last-child{margin-bottom:0}
  .frow.scroll-row{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:3px}
  .frow.scroll-row::-webkit-scrollbar{display:none}
  .fdinp{padding:7px 10px;border:none;border-radius:var(--r-sm);font-size:12px;font-family:inherit;background:var(--card);color:var(--label);outline:none;-webkit-appearance:none;text-align:center;flex:1;min-width:100px;box-shadow:inset 0 2px 4px rgba(0,0,0,.03),0 2px 0 rgba(180,160,140,.15)}
  .fdinp:focus{box-shadow:inset 0 2px 4px rgba(0,0,0,.03),0 0 0 3px rgba(255,107,107,.15)}
  .fsp{flex:1}

  /* txns */
  .group{margin:12px 0;background:var(--card);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .ghdr{font-size:12px;color:var(--sec);padding:8px 18px 6px;font-weight:600}
  .tcell{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:.5px solid var(--sep);transition:background .1s;cursor:pointer}
  .tcell:last-child{border-bottom:none}
  .tcell:active{background:var(--fill)}
  .tcell .icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:inset 0 2px 4px rgba(255,255,255,.6),inset 0 -2px 3px rgba(0,0,0,.04)}
  .tcell .info{flex:1;min-width:0;pointer-events:none}
  .tcell .ttl{font-size:17px;font-weight:600;letter-spacing:-.2px}
  .tcell .sub{font-size:12px;color:var(--sec);margin-top:2px}
  .tcell .val{font-size:19px;font-weight:600;white-space:nowrap;letter-spacing:-.3px;font-variant-numeric:tabular-nums;pointer-events:none}
  .tcell .val.g{color:var(--green)}.tcell .val.r{color:var(--red)}
  .del{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,82,82,.12);color:var(--red);font-size:14px;cursor:pointer;flex-shrink:0;transition:all .15s;z-index:1;font-weight:700}
  .del:active{background:rgba(255,82,82,.3);transform:scale(.9)}

  .empty{text-align:center;padding:80px 20px 40px;color:var(--muted)}
  .empty .ei{font-size:52px;margin-bottom:16px;opacity:.7}
  .empty .et{font-size:16px;font-weight:700;color:var(--sec);margin-bottom:8px}
  .empty .eh{font-size:13px;line-height:1.7;color:var(--muted)}

  /* stats cards */
  .scards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:6px 0 20px}
  .sc{
    background:var(--card);padding:18px 14px;border-radius:var(--r-md);
    box-shadow:var(--shadow-sm);
  }
  .sc .l{font-size:12px;color:var(--sec);font-weight:600}
  .sc .v{font-size:22px;font-weight:700;margin-top:3px;letter-spacing:-.3px}
  .sc.inc .v{color:var(--green)}.sc.exp .v{color:var(--red)}

  .bal-card{
    grid-column:1 / -1;
    background:linear-gradient(145deg,#FF8A65,#FF6B6B,#AB47BC);
    border-radius:var(--r-lg);padding:22px 20px;
    position:relative;overflow:hidden;
    box-shadow:0 8px 0 rgba(180,120,100,.35),0 16px 36px rgba(180,120,100,.2);
  }
  .bal-card::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.25) 0%,transparent 60%);
    pointer-events:none;
  }
  .bal-card .l{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;position:relative;z-index:1}
  .bal-card .v{font-size:30px;font-weight:700;color:#fff;margin-top:4px;letter-spacing:-.4px;position:relative;z-index:1}
  .bal-card .sub-row{display:flex;gap:20px;margin-top:12px;position:relative;z-index:1}
  .bal-card .sub-item{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
  .bal-card .sub-item span{font-weight:700;font-variant-numeric:tabular-nums;color:#fff}

  .chart{background:var(--card);border-radius:var(--r-md);padding:22px 18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
  .chart canvas{max-height:200px}
  .chart .ct{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-.2px}

  /* ranking */
  .rk{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--sep)}
  .rk:last-child{border-bottom:none}
  .rk .n{font-size:15px;font-weight:700;color:var(--sec);width:24px;text-align:center;flex-shrink:0}
  .rk .ri{flex:1;min-width:0}
  .rk .rt{font-size:14px;font-weight:600}
  .rk .rb{height:5px;background:var(--fill);border-radius:3px;margin-top:6px;overflow:hidden}
  .rk .rbb{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.32,.72,0,1)}
  .rk .ra{font-size:15px;font-weight:600;white-space:nowrap}
  .rk .rp{font-size:12px;color:var(--muted);margin-left:3px;font-weight:500}

  /* month nav */
  .mnav{display:flex;align-items:center;margin:10px 0 18px}
  .mnav button{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);font-size:16px;cursor:pointer;color:var(--tint);font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
  .mnav button:active{transform:scale(.9);box-shadow:var(--shadow-press)}
  .mnav span{flex:1;text-align:center;font-size:20px;font-weight:700;letter-spacing:-.3px}

  /* sheet */
  .shim{position:fixed;inset:0;background:rgba(60,48,40,.35);z-index:200;display:none;align-items:flex-end;justify-content:center}
  .shim.show{display:flex;animation:fi .2s}
  @keyframes fi{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--card);border-radius:28px 28px 0 0;width:100%;max-width:500px;max-height:72vh;overflow-y:auto;padding:0 0 30px;animation:su .3s cubic-bezier(.32,.72,0,1)}
  @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet .sh{width:36px;height:5px;background:var(--muted);border-radius:3px;margin:12px auto 0}
  .sheet .st{font-size:18px;font-weight:700;text-align:center;padding:14px 16px 6px;letter-spacing:-.2px}
  .sheet .sb{padding:0 22px}

  /* confirm */
  .confirm-overlay{position:fixed;inset:0;background:rgba(60,48,40,.35);z-index:250;display:none;align-items:center;justify-content:center;animation:fi .2s}
  .confirm-overlay.show{display:flex}
  .confirm-box{background:var(--card);border-radius:var(--r-lg);width:calc(100% - 80px);max-width:300px;text-align:center;overflow:hidden;box-shadow:var(--shadow-md);animation:pop .25s cubic-bezier(.32,.72,0,1)}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .confirm-box .cmsg{padding:26px 22px 10px;font-size:15px;line-height:1.5;font-weight:500}
  .confirm-box .cact{display:flex;border-top:.5px solid var(--sep);margin-top:18px}
  .confirm-box .cact button{flex:1;padding:14px;border:none;background:none;font-size:17px;font-family:inherit;cursor:pointer;transition:background .15s;font-weight:500}
  .confirm-box .cact button:active{background:var(--fill)}
  .confirm-box .cact .cok{color:var(--red);font-weight:700}
  .confirm-box .cact .ccancel{color:var(--tint);border-right:.5px solid var(--sep);font-weight:600}

  /* tab bar — chunky clay pill */
  .tbc{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 48px);max-width:370px}
  .tb{display:flex;background:var(--card);border-radius:50px;padding:6px;box-shadow:0 8px 0 rgba(180,160,140,.25),0 16px 36px rgba(180,160,140,.2)}
  .tb button{flex:1;padding:8px 0 6px;border:none;background:none;color:var(--sec);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;border-radius:50px;position:relative;z-index:1;transition:color .2s}
  .tb button.on{color:var(--label)}
  .tb button.on::before{content:'';position:absolute;inset:2px 6px;background:var(--fill);border-radius:50px;z-index:-1;box-shadow:inset 0 2px 3px rgba(255,255,255,.6),0 2px 0 rgba(180,160,140,.15)}
  .tb button svg{width:24px;height:24px}

  /* toast */
  .toast-area{position:fixed;top:calc(52px + var(--safe-t));left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
  .tst{background:rgba(60,48,40,.94);color:#FFFDF8;padding:12px 22px;border-radius:50px;font-size:14px;font-weight:600;opacity:0;transform:translateY(-10px);transition:all .25s cubic-bezier(.32,.72,0,1);pointer-events:auto;display:flex;align-items:center;gap:12px;box-shadow:0 6px 20px rgba(60,48,40,.3)}
  .tst.show{opacity:1;transform:translateY(0)}
  .tst .undo-btn{background:none;border:none;color:#FFCC80;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;padding:0}

  @media(min-width:500px){body{max-width:430px;margin:0 auto;box-shadow:0 0 120px rgba(0,0,0,.2)}.tbc{max-width:380px}}
</style>
</head>
<body>

<div class="nav"><span class="t" id="navT">记账</span><button class="cancel-btn" id="cancelEdit" onclick="cancelEdit()">取消</button><span class="d" id="navD"></span></div>
<div class="toast-area"><div class="tst" id="tst"></div></div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box"><div class="cmsg" id="confirmMsg"></div><div class="cact"><button class="ccancel" id="confirmNo">取消</button><button class="cok" id="confirmYes">确定</button></div></div>
</div>

<!-- RECORD TAB -->
<div class="tab on" id="tab-record">
  <div class="seg" id="typeToggle">
    <button class="exp on" onclick="setType('expense')">支出</button>
    <button class="inc" onclick="setType('income')">收入</button>
  </div>
  <div class="amt"><span class="sym">¥</span><input type="number" id="amountInput" placeholder="0" step="0.01" min="0.01" inputmode="decimal" autofocus></div>
  <div class="cat-section">
    <div class="lbl">分类 · 长按编辑</div>
    <button class="done-btn" id="doneBtn" onclick="exitJiggle()">完成</button>
    <div class="cgrid" id="categoryGrid"></div>
  </div>
  <div class="row">
    <input type="date" id="dateInput" class="inp" style="text-align:center">
    <input type="text" id="noteInput" class="inp" placeholder="备注（选填）" maxlength="50">
  </div>
  <button class="btn prim" id="recordBtn" onclick="addTransaction()">记录</button>
</div>

<!-- DETAIL TAB -->
<div class="tab" id="tab-detail">
  <div class="fbar">
    <div class="frow">
      <button class="chip on dp" data-p="month" onclick="setDatePreset('month',this)">本月</button>
      <button class="chip dp" data-p="week" onclick="setDatePreset('week',this)">本周</button>
      <button class="chip dp" data-p="today" onclick="setDatePreset('today',this)">今天</button>
      <button class="chip dp" data-p="30d" onclick="setDatePreset('30d',this)">近30天</button>
      <button class="chip dp" data-p="custom" onclick="setDatePreset('custom',this)">自定义</button>
      <span class="fsp"></span>
      <button class="btn exp" onclick="exportExcel()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出</button>
    </div>
    <div class="frow" id="customDateRow" style="display:none">
      <input type="date" id="fdFrom" class="fdinp" onchange="renderDetail()">
      <span style="font-size:12px;color:var(--sec);flex:0;font-weight:500">至</span>
      <input type="date" id="fdTo" class="fdinp" onchange="renderDetail()">
      <span class="fsp"></span>
    </div>
    <div class="frow scroll-row">
      <button class="chip on tc" data-type="all" onclick="setFilterType('all',this)">全部</button>
      <button class="chip tc" data-type="expense" onclick="setFilterType('expense',this)">支出</button>
      <button class="chip tc" data-type="income" onclick="setFilterType('income',this)">收入</button>
      <span id="catChips" style="display:flex;gap:6px"></span>
    </div>
  </div>
  <div id="txnList"></div>
  <div class="empty" id="emptyDetail"><div class="ei">📝</div><div class="et">还没有记录</div><div class="eh">切换到「记账」开始记录吧</div></div>
</div>

<!-- STATS TAB -->
<div class="tab" id="tab-stats">
  <div class="mnav">

</div></div>

<!-- SHEET -->
<div class="shim" id="modalOverlay" onclick="if(event.target===this)closeModal()"><div class="sheet" id="modalContent"></div></div>

<script>
// === DATA ===
const DC = [
  {id:'c1',name:'餐饮',type:'expense',icon:'🍜',color:'#FF8A80'},
  {id:'c2',name:'交通',type:'expense',icon:'🚕',color:'#FFB74D'},
  {id:'c3',name:'购物',type:'expense',icon:'🛍',color:'#CE93D8'},
  {id:'c4',name:'娱乐',type:'expense',icon:'🎮',color:'#F48FB1'},
  {id:'c5',name:'居家',type:'expense',icon:'🏠',color:'#A5D6A7'},
  {id:'c6',name:'日用',type:'expense',icon:'🛒',color:'#81D4FA'},
  {id:'c7',name:'数码',type:'expense',icon:'📱',color:'#90CAF9'},
  {id:'c8',name:'医疗',type:'expense',icon:'💊',color:'#EF9A9A'},
  {id:'c9',name:'学习',type:'expense',icon:'📖',color:'#B39DDB'},
  {id:'c10',name:'其他',type:'expense',icon:'⋯',color:'#BCAAA4'},
  {id:'c11',name:'工资',type:'income',icon:'💼',color:'#81C784'},
  {id:'c12',name:'兼职',type:'income',icon:'💻',color:'#4DD0E1'},
  {id:'c13',name:'理财',type:'income',icon:'📈',color:'#64B5F6'},
  {id:'c14',name:'红包',type:'income',icon:'🧧',color:'#FF8A65'},
  {id:'c15',name:'其他',type:'income',icon:'💰',color:'#A5D6A7'}
];
function ld(){let r=localStorage.getItem('bk');return r?JSON.parse(r):{transactions:[],categories:[...DC]}}
function sv(d){localStorage.setItem('bk',JSON.stringify(d))}
let app=ld(),curType='expense',selCat=null,fType='all',fCat=null,dPreset='month',sYear,sMonth;
let _editingId=null,_lastUndo=null,_undoTimer=null,_confirmResolve=null;
let _jiggle=false,_dragItem=null,_dragStartX=0,_dragStartY=0,_dragOrigIdx=-1;

function gc(t){return app.categories.filter(c=>c.type===t)}
const $=id=>document.getElementById(id),fm=n=>(n||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}),gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8),nowStr=()=>new Date().toISOString().slice(0,10);
function ts(m,u){clearTimeout(_undoTimer);let t=$('tst');t.innerHTML=u?`${m} <button class="undo-btn" onclick="undoLast()">${u}</button>`:m;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>{t.classList.remove('show');_lastUndo=null},u?4000:2200)}

// === HEADER ===
(function(){let n=new Date();$('navD').textContent=`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 周${'日一二三四五六'[n.getDay()]}`})();

// === TABS ===
function switchTab(t,e){
  cancelEdit();exitJiggle();
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.tb button').forEach(el=>el.classList.remove('on'));
  $('tab-'+t).classList.add('on');
  let btn=$({record:'tbRecord',detail:'tbDetail',stats:'tbStats'}[t]);
  if(btn)btn.classList.add('on');
  $('navT').textContent={record:'记账',detail:'明细',stats:'统计'}[t];
  $('cancelEdit').style.display='none';
  if(t==='record'){renderCats();setTimeout(()=>$('amountInput').focus(),300)}
  if(t==='detail'){renderCatChips();renderDetail()}
  if(t==='stats'){initSM();renderStats()}
}

// === INPUT ===
$('amountInput').addEventListener('input',function(){let v=this.value.replace(/[^\d.]/g,''),p=v.split('.');if(p.length>2)v=p[0]+'.'+p.slice(1).join('');if(p.length===2&&p[1].length>2)v=p[0]+'.'+p[1].slice(0,2);this.value=v});

// === TYPE & CATS ===
function setType(t){curType=t;selCat=null;exitJiggle();document.querySelectorAll('.seg button').forEach(b=>b.classList.remove('on'));document.querySelector(`.seg .${t==='expense'?'exp':'inc'}`).classList.add('on');renderCats()}
function selectCat(id){if(_jiggle)return;selCat=selCat===id?null:id;renderCats()}
function renderCats(){
  let g=$('categoryGrid'),cs=gc(curType);
  g.innerHTML=cs.map((c,i)=>`<div class="cc${c.id===selCat?' sel':''}${_jiggle?' jiggle':''}" data-cat-id="${c.id}" data-idx="${i}" onclick="${_jiggle?'':'selectCat(\`'+c.id+'\`)'}" ontouchstart="onCatTouch(event,'${c.id}')" onmousedown="onCatMouse(event,'${c.id}')">
    <div class="del-badge" onclick="event.stopPropagation();deleteCatItem('${c.id}')">✕</div>
    <div class="ci">${c.icon}</div><span>${c.name}</span>
  </div>`).join('')+`<div class="cc mg" onclick="${_jiggle?'':'openCatManage()'}"><div class="ci" style="background:transparent;font-size:22px">⚙</div><span>编辑</span></div>`;
}

// === JIGGLE MODE ===
let _longPressTimer=null;
function startLongPress(catId){_longPressTimer=setTimeout(()=>enterJiggle(catId),550)}
function cancelLongPress(){clearTimeout(_longPressTimer);_longPressTimer=null}

function onCatTouch(e,catId){
  if(e.touches.length>1)return;
  if(_jiggle){startDrag(e.touches[0],catId);return}
  startLongPress(catId);
  let el=e.currentTarget;
  el.addEventListener('touchend',function h(){cancelLongPress();el.removeEventListener('touchend',h)}, {once:true});
  el.addEventListener('touchmove',function h(){cancelLongPress();el.removeEventListener('touchmove',h)}, {once:true});
}
function onCatMouse(e,catId){
  if(_jiggle){startDrag(e,catId);return}
  startLongPress(catId);
  let el=e.currentTarget;
  el.addEventListener('mouseup',function h(){cancelLongPress();el.removeEventListener('mouseup',h)},{once:true});
  el.addEventListener('mousemove',function h(){cancelLongPress();el.removeEventListener('mousemove',h)},{once:true});
}

function enterJiggle(catId){
  _jiggle=true;$('doneBtn').classList.add('show');
  document.querySelectorAll('.cgrid .cc').forEach(el=>el.classList.add('jiggle'));
  renderCats();
}

function exitJiggle(){
  _jiggle=false;_dragItem=null;
  $('doneBtn').classList.remove('show');
  document.querySelectorAll('.cgrid .cc').forEach(el=>{el.classList.remove('jiggle');el.style.transform='';el.style.opacity='';el.style.zIndex=''});
  renderCats();
}

function deleteCatItem(id){
  showConfirm('删除这个分类？').then(ok=>{if(!ok)return;app.categories=app.categories.filter(c=>c.id!==id);sv(app);renderCats()});
}

// === DRAG REORDER ===
function startDrag(e,catId){
  if(!_jiggle)return;
  let el=document.querySelector(`.cc[data-cat-id="${catId}"]`);if(!el)return;
  _dragItem=el;_dragOrigIdx=parseInt(el.dataset.idx);
  el.classList.add('dragging');el.style.zIndex='20';
  let cx=e.clientX||(e.touches&&e.touches[0].clientX),cy=e.clientY||(e.touches&&e.touches[0].clientY);
  _dragStartX=cx;_dragStartY=cy;

  function mv(ev){if(!_dragItem)return;ev.preventDefault();
    let x=ev.clientX||(ev.touches&&ev.touches[0].clientX),y=ev.clientY||(ev.touches&&ev.touches[0].clientY);
    let dx=x-_dragStartX,dy=y-_dragStartY;
    _dragItem.style.transform=`translate(${dx}px,${dy}px) scale(1.08)`;
    findDropTarget(x,y);
  }
  function up(ev){
    if(!_dragItem)return;
    _dragItem.classList.remove('dragging');_dragItem.style.transform='';_dragItem.style.zIndex='';
    document.querySelectorAll('.cc.drag-over').forEach(e=>e.classList.remove('drag-over'));
    let tx=ev.clientX||(ev.changedTouches&&ev.changedTouches[0].clientX),ty=ev.clientY||(ev.changedTouches&&ev.changedTouches[0].clientY);
    dropAt(tx,ty);
    _dragItem=null;
    document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up);
    document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);
  }
  document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}

function findDropTarget(x,y){
  document.querySelectorAll('.cc.drag-over').forEach(e=>e.classList.remove('drag-over'));
  let els=[...document.querySelectorAll('.cgrid .cc:not(.dragging):not(.mg)')];
  let target=null,minD=Infinity;
  els.forEach(el=>{let r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let d=Math.hypot(x-cx,y-cy);if(d<minD&&d<60){minD=d;target=el}});
  if(target)target.classList.add('drag-over');
}

function dropAt(x,y){
  let els=[...document.querySelectorAll('.cgrid .cc:not(.mg)')];
  let target=null;els.forEach(el=>{let r=el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)target=el});
  if(!target||target===_dragItem)return;
  let dragId=_dragItem.dataset.catId,targetId=target.dataset.catId;
  let dragIdx=app.categories.findIndex(c=>c.id===dragId),targetIdx=app.categories.findIndex(c=>c.id===targetId);
  if(dragIdx<0||targetIdx<0)return;
  let cs=gc(curType),dcs=cs[dragIdx],tcs=cs[targetIdx];
  if(!dcs||!tcs)return;
  let gi=app.categories.indexOf(dcs),ti=app.categories.indexOf(tcs);
  app.categories.splice(gi,1);app.categories.splice(ti,0,dcs);
  sv(app);renderCats();
}

// === EDIT MODE ===
function startEdit(txn){
  _editingId=txn.id;if(txn.type!==curType)setType(txn.type);
  $('amountInput').value=txn.amount;$('dateInput').value=txn.date;$('noteInput').value=txn.note||'';
  selCat=txn.categoryId;renderCats();
  $('recordBtn').textContent='更新';$('recordBtn').classList.add('upd');
  $('navT').textContent='编辑';$('cancelEdit').style.display='block';
  switchTab('record');
}
function cancelEdit(){
  if(!_editingId)return;_editingId=null;$('amountInput').value='';$('noteInput').value='';selCat=null;
  $('recordBtn').textContent='记录';$('recordBtn').classList.remove('upd');
  $('navT').textContent='记账';$('cancelEdit').style.display='none';renderCats();
}

// === ADD / UPDATE ===
function addTransaction(){
  let v=parseFloat($('amountInput').value);if(!v||v<=0){shake($('amountInput'));return}
  if(!selCat){let f=gc(curType)[0];if(f)selCat=f.id;else{ts('请先添加分类');return}}
  if(_editingId){
    let txn=app.transactions.find(t=>t.id===_editingId);
    if(txn){txn.type=curType;txn.amount=v;txn.categoryId=selCat;txn.date=$('dateInput').value||nowStr();txn.note=$('noteInput').value.trim()}
    sv(app);cancelEdit();$('amountInput').value='';$('noteInput').value='';selCat=null;renderCats();ts('已更新');
  }else{
    let txn={id:gid(),type:curType,amount:v,categoryId:selCat,date:$('dateInput').value||nowStr(),note:$('noteInput').value.trim(),createdAt:Date.now()};
    app.transactions.unshift(txn);sv(app);$('amountInput').value='';$('noteInput').value='';selCat=null;renderCats();
    _lastUndo=txn;ts('已记录','撤销');
  }
}
function undoLast(){
  if(!_lastUndo)return;app.transactions=app.transactions.filter(t=>t.id!==_lastUndo.id);
  sv(app);_lastUndo=null;let t=$('tst');t.classList.remove('show');ts('已撤销');
}

function shake(e){e.style.animation='none';void e.offsetHeight;e.style.animation='shake .45s ease'}
let sc=document.createElement('style');sc.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}';document.head.appendChild(sc);

// === DETAIL FILTERS ===
function getDR(){
  let t=new Date(),ts=nowStr(),f,to;
  switch(dPreset){case'today':f=to=ts;break;case'week':{let d=new Date(t);d.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1));f=d.toISOString().slice(0,10);to=ts;break}case'month':f=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-01`;to=ts;break;case'30d':{let d=new Date(t);d.setDate(d.getDate()-29);f=d.toISOString().slice(0,10);to=ts;break}case'custom':f=$('fdFrom').value||ts;to=$('fdTo').value||ts;break;default:f=to=ts}return{f,to}
}
function setDatePreset(p,b){dPreset=p;document.querySelectorAll('.dp').forEach(b=>b.classList.remove('on'));b.classList.add('on');$('customDateRow').style.display=p==='custom'?'flex':'none';if(p==='custom'){if(!$('fdFrom').value)$('fdFrom').value=nowStr();if(!$('fdTo').value)$('fdTo').value=nowStr()}renderDetail()}
function setFilterType(t,b){fType=t;document.querySelectorAll('.tc').forEach(b=>b.classList.remove('on'));b.classList.add('on');fCat=null;renderCatChips();renderDetail()}
function setFilterCat(id){fCat=fCat===id?null:id;renderCatChips();renderDetail()}
function renderCatChips(){let c=$('catChips'),cats=fType==='all'?app.categories:gc(fType);c.innerHTML=cats.map(c=>`<button class="chip${fCat===c.id?' on':''}" onclick="setFilterCat('${c.id}')">${c.name}</button>`).join('')}
function getFTxns(){let{f,to}=getDR(),txns=[...app.transactions].filter(t=>t.date>=f&&t.date<=to);if(fType!=='all')txns=txns.filter(t=>t.type===fType);if(fCat)txns=txns.filter(t=>t.categoryId===fCat);txns.sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt-a.createdAt);return txns}

// === RENDER DETAIL ===
function renderDetail(){
  let txns=getFTxns(),em=$('emptyDetail');
  if(!txns.length){$('txnList').innerHTML='';em.style.display='block';return}
  em.style.display='none';let grp={};txns.forEach(t=>{if(!grp[t.date])grp[t.date]=[];grp[t.date].push(t)});let h='';
  for(let[dt,items]of Object.entries(grp)){let tot=items.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0),lb=tot>=0?`+¥${fm(tot)}`:`-¥${fm(Math.abs(tot))}`;
    h+=`<div class="ghdr" style="margin-top:14px">${dt} · <span style="color:${tot>=0?'var(--green)':'var(--red)'};font-weight:600">${lb}</span></div>`;
    h+='<div class="group">';items.forEach(t=>{let c=app.categories.find(c=>c.id===t.categoryId)||{};
    h+=`<div class="tcell" onclick="startEdit(${JSON.stringify(t).replace(/"/g,'&quot;')})"><div class="icon" style="background:${c.color||'#BCAAA4'}25;color:${c.color||'#8B7E74'}">${c.icon||'⋯'}</div><div class="info"><div class="ttl">${c.name||'未分类'}</div><div class="sub">${t.note?eh(t.note):(t.type==='income'?'收入':'支出')}</div></div><div class="val ${t.type==='income'?'g':'r'}">${t.type==='income'?'+':'-'}¥${fm(t.amount)}</div><button class="del" onclick="event.stopPropagation();delTxn('${t.id}')">✕</button></div>`});
    h+='</div>'}$('txnList').innerHTML=h
  }
}
function eh(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function delTxn(id){showConfirm('删除这条记录？').then(ok=>{if(!ok)return;app.transactions=app.transactions.filter(t=>t.id!==id);if(_editingId===id)cancelEdit();sv(app);renderDetail();ts('已删除')})}

// === CONFIRM ===
function showConfirm(msg){return new Promise(resolve=>{$('confirmMsg').textContent=msg;$('confirmOverlay').classList.add('show');_confirmResolve=resolve})}
$('confirmNo').addEventListener('click',()=>{$('confirmOverlay').classList.remove('show');if(_confirmResolve)_confirmResolve(false);_confirmResolve=null});
$('confirmYes').addEventListener('click',()=>{$('confirmOverlay').classList.remove('show');if(_confirmResolve)_confirmResolve(true);_confirmResolve=null});
$('confirmOverlay').addEventListener('click',function(e){if(e.target===this){this.classList.remove('show');if(_confirmResolve)_confirmResolve(false);_confirmResolve=null}});

// === EXPORT ===
function exportExcel(){
  let txns=getFTxns();if(!txns.length){ts('暂无记录可导出');return}
  let{f,to}=getDR(),lb=f===to?f:`${f}至${to}`,rows=[['日期','类型','分类','金额','备注']],inc=0,exp=0;
  txns.forEach(t=>{let c=app.categories.find(c=>c.id===t.categoryId);rows.push([t.date,t.type==='income'?'收入':'支出',c?c.name:'未分类',t.amount,t.note||'']);t.type==='income'?inc+=t.amount:exp+=t.amount});
  rows.push([],['','','收入合计',inc,''],['','','支出合计',exp,''],['','','结余',inc-exp,'']);
  let wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:8},{wch:12},{wch:12},{wch:22}];
  for(let r=rows.length-2;r<rows.length;r++)for(let c=0;c<5;c++){let cl=XLSX.utils.encode_cell({r,c});if(ws[cl])ws[cl].s={font:{bold:true}}}
  XLSX.utils.book_append_sheet(wb,ws,'账单');XLSX.writeFile(wb,`${lb}.xlsx`);
}

// === STATS ===
function initSM(){let n=new Date();sYear=n.getFullYear();sMonth=n.getMonth()+1;syncSM()}
function syncSM(){$('statsMonth').value=`${sYear}-${String(sMonth).padStart(2,'0')}`;$('statsMonthLabel').textContent=`${sYear}年${sMonth}月`}
function shiftMonth(d){sMonth+=d;if(sMonth>12){sMonth=1;sYear++}if(sMonth<1){sMonth=12;sYear--}if(sYear>new Date().getFullYear()+2||sYear<2000)return;syncSM();renderStats()}
let pc=null,tcChart=null;
function renderStats(){
  let m=$('statsMonth').value,txns=app.transactions.filter(t=>t.date.startsWith(m));
  let inc=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),exp=txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  $('sumIncome').textContent=`¥${fm(inc)}`;$('sumExpense').textContent=`¥${fm(exp)}`;$('sumBalance').textContent=`${inc-exp>=0?'+':''}¥${fm(inc-exp)}`;
  $('balInc').textContent=`¥${fm(inc)}`;$('balExp').textContent=`¥${fm(exp)}`;
  let cm={};txns.filter(t=>t.type==='expense').forEach(t=>{let c=app.categories.find(c=>c.id===t.categoryId),n=c?c.name:'未分类',cl=c?c.color:'#8E8E93';if(!cm[n])cm[n]={a:0,cl};cm[n].a+=t.amount});
  let lbs=Object.keys(cm),dt=lbs.map(k=>cm[k].a),cls=lbs.map(k=>cm[k].cl);
  let ctx=(pc?(pc.destroy(),null):null,$('pieChart').getContext('2d'));
  pc=new Chart(ctx,{type:'doughnut',data:{labels:lbs.length?lbs:['暂无'],datasets:[{data:lbs.length?dt:[1],backgroundColor:lbs.length?cls:['#E8DFD5'],borderWidth:3,borderColor:'#FFFDF8'}]},options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{position:'bottom',labels:{padding:18,usePointStyle:true,pointStyleWidth:8,font:{size:11,family:'-apple-system,PingFang SC,sans-serif'},color:'#8B7E74'}}}}});
  let srt=Object.entries(cm).sort((a,b)=>b[1].a-a[1].a),mx=srt[0]?srt[0][1].a:1;
  if(srt.length){$('rankCard').style.display='';$('rankList').innerHTML=srt.map(([n,d],i)=>`<div class="rk"><span class="n">${i+1}</span><div class="ri"><div class="rt">${n}</div><div class="rb"><div class="rbb" style="width:${(d.a/mx*100)|0}%;background:${d.cl}"></div></div></div><span class="ra">¥${fm(d.a)}</span><span class="rp">${exp?(d.a/exp*100).toFixed(1):0}%</span></div>`).join('')}else{$('rankCard').style.display='none'}
  let tctx=(tcChart?(tcChart.destroy(),null):null,$('trendChart').getContext('2d'));
  let ms=[];for(let i=5;i>=0;i--){let d=new Date(new Date().getFullYear(),new Date().getMonth()-i,1);ms.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`)}
  let tI=ms.map(m=>app.transactions.filter(t=>t.type==='income'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0)),tE=ms.map(m=>app.transactions.filter(t=>t.type==='expense'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
  tcChart=new Chart(tctx,{type:'bar',data:{labels:ms.map(m=>m.slice(5).replace(/^0/,'')+'月'),datasets:[{label:'收入',data:tI,backgroundColor:'#81C784',borderRadius:8,borderSkipped:false},{label:'支出',data:tE,backgroundColor:'#FF8A80',borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:22,font:{size:11},color:'#8B7E74'}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'¥'+v,font:{size:10},color:'#8B7E74'},grid:{color:'#E8DFD5'}},x:{ticks:{font:{size:10},color:'#8B7E74'},grid:{display:false}}}}})
}

// === CAT MANAGE ===
function openCatManage(){
  $('modalContent').innerHTML=`<div class="sh"></div><div class="st">管理分类</div><div class="sb">
    <div style="display:flex;gap:6px;margin-bottom:14px"><button class="chip on cmt" data-ct="expense" onclick="switchCMT('expense')">支出</button><button class="chip cmt" data-ct="income" onclick="switchCMT('income')">收入</button></div>
    <div id="catMgrList" style="margin-bottom:14px"></div>
    <div style="border-top:.5px solid var(--sep);padding-top:14px"><div class="lbl" style="margin-bottom:8px">添加新分类</div>
      <div class="row"><input type="text" id="ncName" class="inp" placeholder="名称" maxlength="6"><input type="text" id="ncIcon" class="inp" placeholder="图标" maxlength="4" style="flex:0 0 60px"></div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap"><span style="font-size:12px;color:var(--sec);font-weight:600">颜色</span>
        <div id="clrOpts" style="display:flex;gap:6px;flex-wrap:wrap">${['#FF8A80','#FFB74D','#FFD54F','#81C784','#4DD0E1','#64B5F6','#7986CB','#BA68C8','#F48FB1','#A5D6A7','#90CAF9','#BCAAA4'].map(c=>`<div style="width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;background:${c}" data-c="${c}" onclick="selClr('${c}',this)"></div>`).join('')}</div>
      </div>
      <input type="hidden" id="ncColor" value="#FF8A80"><button class="btn prim" onclick="addCategory()">添加</button>
    </div>
    <button class="btn" onclick="closeModal()" style="width:100%;margin-top:10px;background:var(--fill);border-radius:50px;font-size:16px;font-weight:600;box-shadow:var(--shadow-sm)">关闭</button>
  </div>`;
  setTimeout(()=>{let f=document.querySelector('#clrOpts div');if(f){f.style.borderColor='var(--label)';f.style.transform='scale(1.15)';$('ncColor').value=f.dataset.c}},60);
  $('modalOverlay').classList.add('show');switchCMT(curType)
}
function switchCMT(t){document.querySelectorAll('.cmt').forEach(b=>b.classList.remove('on'));document.querySelector(`.cmt[data-ct="${t}"]`).classList.add('on');let cs=gc(t);$('catMgrList').innerHTML=cs.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--fill);border-radius:var(--r-sm);margin-bottom:6px;font-size:14px;font-weight:500"><span>${c.icon} ${c.name}</span><button onclick="deleteCategory('${c.id}')" style="background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:4px 8px;border-radius:6px;font-weight:600">删除</button></div>`).join('')||'<p style="color:var(--sec);font-size:13px;text-align:center;padding:14px">暂无分类</p>'}
function selClr(cl,el){document.querySelectorAll('#clrOpts div').forEach(d=>{d.style.borderColor='transparent';d.style.transform=''});el.style.borderColor='var(--label)';el.style.transform='scale(1.15)';$('ncColor').value=cl}
function addCategory(){let n=$('ncName').value.trim();if(!n){ts('请输入分类名称');return}let ic=$('ncIcon').value.trim()||'⋯',cl=$('ncColor').value,at=document.querySelector('.cmt.on');app.categories.push({id:gid(),name:n,type:at?at.dataset.ct:curType,icon:ic,color:cl});sv(app);openCatManage();renderCats()}
function deleteCategory(id){let c=app.categories.find(c=>c.id===id);if(!c)return;let used=app.transactions.some(t=>t.categoryId===id);
  showConfirm(used?`分类"${c.name}"有关联记录，删除后显示为"未分类"。确定？`:`确定删除分类"${c.name}"？`).then(ok=>{if(!ok)return;app.categories=app.categories.filter(c=>c.id!==id);sv(app);openCatManage();renderCats()});
}
function closeModal(){$('modalOverlay').classList.remove('show')}

// === INIT ===
$('dateInput').value=nowStr();renderCats();renderCatChips();initSM();renderStats();
if('serviceWorker' in navigator){let sw=`var CACHE='bkv9',CDN=['cdn.jsdelivr.net'];self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()))});self.addEventListener('fetch',e=>{var u=new URL(e.request.url);if(e.request.mode==='navigate'||!CDN.some(h=>u.host.includes(h)))return;e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(hit=>{var p=fetch(e.request).then(r=>{if(r.ok){var rc=r.clone();c.put(e.request,rc)}return r});return hit||p.catch(()=>hit)})))})`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{})}
</script>
</body>
